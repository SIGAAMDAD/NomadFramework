name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: true
  NOMAD_CONFIGURATION: Release
  NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

jobs:
  release:
    name: Build and Publish Release
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        cache: true
        cache-dependency-path: |
          **/*.csproj
          **/*.props
          **/*.targets

    - name: Restore
      shell: pwsh
      run: ./Build/Scripts/restore.ps1

    - name: Validate repo
      shell: pwsh
      run: ./Build/Scripts/validate-repo.ps1

    - name: Format check
      shell: pwsh
      run: ./Build/Scripts/format-check.ps1

    - name: Build
      shell: pwsh
      run: ./Build/Scripts/build.ps1

    - name: Unit tests
      shell: pwsh
      run: ./Build/Scripts/test-unit.ps1

    - name: Generate release notes
      shell: pwsh
      run: ./Build/Scripts/generate-release-notes.ps1

    - name: Generate compatibility matrix
      shell: pwsh
      run: ./Build/Scripts/generate-compatibility-matrix.ps1

    - name: Generate public API
      shell: pwsh
      run: ./Build/Scripts/generate-public-api.ps1
    
    - name: Generate architecture docs
      shell: pwsh
      run: ./Build/Scripts/generate-architecture-docs.ps1
    
    - name: Verify generated architecture docs are up to date
      run: git diff --exit-code Documentation/Architecture/Generated

    - name: Pack
      shell: pwsh
      run: ./Build/Scripts/pack.ps1

    - name: Upload NuGet artifacts
      uses: actions/upload-artifact@v4
      with:
        name: release-nuget-packages
        path: NuGet
        if-no-files-found: error

    - name: Upload release reports
      uses: actions/upload-artifact@v4
      with:
        name: release-reports
        path: Artifacts
        if-no-files-found: ignore

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          NuGet/*.nupkg
          NuGet/*.snupkg
          Artifacts/*
        body_path: Artifacts/ReleaseNotes.md
        generate_release_notes: true

    - name: Publish to NuGet
      if: env.NUGET_API_KEY != ''
      shell: pwsh
      run: |
        $packages = Get-ChildItem -Path "NuGet" -Filter "*.nupkg"

        foreach ( $package in $packages ) {
          dotnet nuget push $package.FullName `
            --api-key "$env:NUGET_API_KEY" `
            --source "https://api.nuget.org/v3/index.json" `
            --skip-duplicate
        }