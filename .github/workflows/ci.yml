name: ⚡ Optimized CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

on:
  schedule:
    - cron: '0 2 * * *'  # Run at 2 AM daily

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        dotnet-version: ['10.0.x', '8.0.x']
    
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    
    - name: ⚙️ Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ matrix.dotnet-version }}
    
    # CACHE for faster builds
    - name: 💾 Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-
    
    - name: 🔒 Check for vulnerable packages
      run: dotnet list package --vulnerable --include-transitive
    
    - name: 💾 Cache build output
      uses: actions/cache@v4
      with:
        path: |
          ~/.local/share/NuGet
          ~/.nuget
          **/bin
          **/obj
        key: ${{ runner.os }}-build-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-build-
    
    # WINDOWS-SPECIFIC OPTIMIZATIONS
    - name: 🪟 Windows optimizations
      if: runner.os == 'Windows'
      run: |
        # Disable Windows Defender during build (temporary)
        Set-MpPreference -DisableRealtimeMonitoring $true
        # Clean temp files
        Remove-Item -Path "$env:TEMP\*" -Recurse -Force -ErrorAction SilentlyContinue
        # Increase process priority
        $process = Get-Process -Id $PID
        $process.PriorityClass = [System.Diagnostics.ProcessPriorityClass]::High
    
    - name: 📦 Restore
      run: |
        dotnet restore NomadFramework.slnx
    
    - name: 🔨 Build
      run: |
        dotnet build NomadFramework.slnx --configuration Release --no-restore
    
    - name: 🧪 Run tests with coverage
      run: |
        dotnet test --configuration Release --no-build --collect:"XPlat Code Coverage" --settings coverlet.runsettings

    - name: ☁️ Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        files: '**/coverage.cobertura.xml'
        flags: ${{ runner.os }}
      