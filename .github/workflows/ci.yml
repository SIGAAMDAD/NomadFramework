name: ⚡ Optimized CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        dotnet-version: ['10.0.x']
    
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    
    - name: ⚙️ Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ matrix.dotnet-version }}
    
    # CACHE for faster builds
    - name: 💾 Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-
    
    - name: 💾 Cache build output
      uses: actions/cache@v4
      with:
        path: |
          ~/.local/share/NuGet
          ~/.nuget
          **/bin
          **/obj
        key: ${{ runner.os }}-build-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-build-
    
    # WINDOWS-SPECIFIC OPTIMIZATIONS
    - name: 🪟 Windows optimizations
      if: runner.os == 'Windows'
      run: |
        # Disable Windows Defender during build (temporary)
        Set-MpPreference -DisableRealtimeMonitoring $true
        # Clean temp files
        Remove-Item -Path "$env:TEMP\*" -Recurse -Force -ErrorAction SilentlyContinue
        # Increase process priority
        $process = Get-Process -Id $PID
        $process.PriorityClass = [System.Diagnostics.ProcessPriorityClass]::High
    
    - name: 📦 Restore packages
      run: |
        dotnet restore Source/Nomad.Core/Nomad.Core.csproj
        dotnet restore Source/Nomad.CVars/Nomad.CVars.csproj
        dotnet restore Source/Nomad.FileSystem/Nomad.FileSystem.csproj
        dotnet restore Source/Nomad.Events/Nomad.Events.csproj
        dotnet restore Source/Nomad.Console/Nomad.Console.csproj
        dotnet restore Source/Nomad.Logger/Nomad.Logger.csproj
    
    - name: 🔨 Build for multiple frameworks
      run: |
        # Build for all target frameworks in your csproj
        dotnet build Source/Nomad.Core/Nomad.Core.csproj --configuration Release --no-restore --verbosity minimal
        dotnet build Source/Nomad.CVars/Nomad.CVars.csproj --configuration Release --no-restore --verbosity minimal
        dotnet build Source/Nomad.FileSystem/Nomad.FileSystem.csproj --configuration Release --no-restore --verbosity minimal
        dotnet build Source/Nomad.Events/Nomad.Events.csproj --configuration Release --no-restore --verbosity minimal
        dotnet build Source/Nomad.Console/Nomad.Console.csproj --configuration Release --no-restore --verbosity minimal
        dotnet build Source/Nomad.Logger/Nomad.Logger.csproj --configuration Release --no-restore --verbosity minimal
        
        # Or force specific frameworks:
        # dotnet build -f net10.0 --configuration Release
        # dotnet build -f netstandard2.1 --configuration Release
    
    - name: 🧪 Run tests (Linux)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        echo "Testing with .NET ${{ matrix.dotnet-version }} on ${{ matrix.os }}"
        find . -name "*Test*.csproj" | while read project; do
          echo "Testing: $(basename $project)"
          dotnet test "$project" --configuration Release --no-build
        done

    - name: 🧪 Run tests (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        echo "Testing with .NET ${{ matrix.dotnet-version }} on ${{ matrix.os }}"
        $testProjects = Get-ChildItem -Path . -Recurse -Filter "*Test*.csproj"
        foreach ($proj in $testProjects) {
          echo "Testing: $($proj.Name)"
          dotnet test $proj.FullName --configuration Release --no-build
        }
      timeout-minutes: 15