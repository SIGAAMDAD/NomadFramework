name: Build

on:
  push:
    branches: [ main, develop, 'feature/*', 'bugfix/*' ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * *'  # Run at 2 AM daily

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        dotnet-version: ['10.0.x', '8.0.x', '11.0.x']
    
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: ⚙️ Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ matrix.dotnet-version }}
        cache: true
        cache-dependency-path: '**/*.csproj'

    - name: ✅ Validate solution
      run: dotnet sln NomadFramework.slnx list

    - name: 🔒 Check for vulnerable packages
      run: dotnet list package --vulnerable --include-transitive

    - name: 📦 Restore
      run: dotnet restore

    - name: 🔍 Check code format
      run: dotnet format --verify-no-changes
    - name: Install SonarScanner
      run: dotnet tool install --global dotnet-sonarscanner

    - name: Begin SonarCloud scan
      if: runner.os == 'Linux' && matrix.dotnet-version == '10.0.x' && github.ref == 'refs/heads/main'
      run: |
        dotnet sonarscanner begin /k:"SIGAAMDAD_NomadFramework" \
          /o:"sigaamdad" \
          /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
          /d:sonar.host.url="https://sonarcloud.io" \
          /d:sonar.cs.opencover.reportsPaths="**/Tests/TestResults/**/coverage.opencover.xml" \
          /d:sonar.coverage.exclusions="**Tests*.cs"  # optional exclusions

    - name: 🔨 Build with analyzers
      run: dotnet build --configuration Release --no-restore -p:RunAnalyzers=true

    - name: 🧪 Run tests with coverage
      run: dotnet test Tests/Nomad.Tests.csproj --no-build --collect:"XPlat Code Coverage" --settings coverlet.runsettings --results-directory ./Tests/TestResults

    - name: Merge coverage reports
      run: |
        dotnet tool install -g dotnet-reportgenerator-globaltool
        reportgenerator -reports:./Tests/TestResults/**/coverage.cobertura.xml -targetdir:./Tests/CoverageResults -reporttypes:Cobertura

    - name: 📤 Upload coverage to Codecov
      if: always() && (github.event_name == 'push' || github.event_name == 'pull_request')
      uses: codecov/codecov-action@v5
      with:
        files: ./Tests/CoverageResults/Cobertura.xml
        flags: unittests
        name: codecov-${{ matrix.os }}-${{ matrix.dotnet-version }}
        fail_ci_if_error: true
        verbose: true
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    - name: 📎 Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.os }}-${{ matrix.dotnet-version }}
        path: ./Tests/TestResults
    
    - name: End SonarCloud scan
      if: runner.os == 'Linux' && matrix.dotnet-version == '10.0.x' && github.ref == 'refs/heads/main'
      run: dotnet sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
