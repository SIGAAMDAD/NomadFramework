name: Build

on:
  push:
    branches: [ main, develop, 'feature/*', 'bugfix/*' ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * *'  # Run at 2 AM daily

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        dotnet-version: ['10.0.x', '8.0.x', '11.0.x']
    
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: ⚙️ Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ matrix.dotnet-version }}
        cache: true
        cache-dependency-path: '**/*.csproj'

    - name: ✅ Validate solution
      run: dotnet sln NomadFramework.slnx list

    - name: 🔒 Check for vulnerable packages
      run: dotnet list package --vulnerable --include-transitive

    - name: 📦 Restore
      run: dotnet restore

    - name: 🔍 Check code format
      run: dotnet format --verify-no-changes
    - name: Install SonarScanner
      run: dotnet tool install --global dotnet-sonarscanner

    - name: Begin SonarCloud scan
      if: runner.os == 'Linux' && matrix.dotnet-version == '10.0.x'
      run: |
        dotnet sonarscanner begin /k:"SIGAAMDAD_NomadFramework" \
          /o:"sigaamdad" \
          /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
          /d:sonar.host.url="https://sonarcloud.io" \
          /d:sonar.cs.opencover.reportsPaths="**/TestResults/**/coverage.opencover.xml" \
          /d:sonar.coverage.exclusions="**Tests*.cs"  # optional exclusions

    - name: 🔨 Build with analyzers
      run: dotnet build --configuration Release --no-restore -p:RunAnalyzers=true

    - name: 🧪 Run tests with coverage
      run: dotnet test --configuration Release --no-build --collect:"XPlat Code Coverage" --settings coverlet.runsettings

    - name: 📎 Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.os }}-${{ matrix.dotnet-version }}
        path: ./TestResults
    
    - name: End SonarCloud scan
      if: runner.os == 'Linux' && matrix.dotnet-version == '10.0.x'
      run: dotnet sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"