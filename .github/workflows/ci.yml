name: ⚡ Optimized CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * *'  # Run at 2 AM daily

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        dotnet-version: ['10.0.x', '8.0.x', '11.0.x']
    
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
    
    - name: ⚙️ Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ matrix.dotnet-version }}
        cache-depdendency-path: '**/*.csproj'
    
    - name: ✅ Validate solution
      run: dotnet sln NomadFramework.slnx list
    
    - name: 🔒 Check for vulnerable packages
      run: dotnet list NomadFramework.slnx package --vulnerable --include-transitive
    
    - name: 💾 Cache build output
      uses: actions/cache@v4
      with:
        path: |
          ~/.local/share/NuGet
          ~/.nuget
          **/bin
          **/obj
        key: ${{ runner.os }}-build-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-build-
    
    # WINDOWS-SPECIFIC OPTIMIZATIONS
    - name: 🪟 Windows optimizations
      if: runner.os == 'Windows'
      run: |
        # Disable Windows Defender during build (temporary)
        Set-MpPreference -DisableRealtimeMonitoring $true
        # Clean temp files
        Remove-Item -Path "$env:TEMP\*" -Recurse -Force -ErrorAction SilentlyContinue
        # Increase process priority
        $process = Get-Process -Id $PID
        $process.PriorityClass = [System.Diagnostics.ProcessPriorityClass]::High
    
    - name: 📦 Restore
      run: |
        dotnet restore NomadFramework.slnx

    - name: 🔍 Check code format
      run: dotnet format --verify-no-changes
    - name: 🔬 Run static analysis
      run: |
        dotnet build NomadFramework.slnx --configuration Release --no-restore -p:RunAnalyzers=true
    
    - name: 🔨 Build
      run: |
        dotnet build NomadFramework.slnx --configuration Release --no-restore
    
    - name: 🧪 Run tests with coverage
      run: |
        dotnet test --configuration Release --no-build --collect:"XPlat Code Coverage" --settings coverlet.runsettings

    - name: 📎 Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.os }}-${{ matrix.dotnet-version }}
        path: ./TestResults
    
    - name: 🔧 Install Doxygen (Ubuntu)
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y doxygen

    - name: 🔧 Install Doxygen (macOS)
      if: runner.os == 'macOS'
      run: brew install doxygen

    - name: 🔧 Install Doxygen (Windows)
      if: runner.os == 'Windows'
      run: choco install doxygen.install --no-progress

    - name: 📚 Generate Doxygen documentation
      run: doxygen Doxyfile
      continue-on-error: true
    
    - name: 🚀 Deploy docs to Wiki
      if: github.ref == 'refs/heads/main'
      run: |
        # Clone the wiki repo
        git clone https://github.com/${{ github.repository }}.wiki.git ./wiki
        cd wiki

        # Remove old docs (optional, depending on your needs)
        rm -rf ./*

        # Copy new docs
        cp -r ../Documentation/html/* .

        # Configure git
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        # Add all changes
        git add --all

        # Commit if there are changes
        if git diff --cached --quiet; then
          echo "No changes to commit"
          exit 0
        fi

        git commit -m "Update Wiki documentation from CI"

        # Pull remote changes (with rebase) before pushing
        git pull --rebase origin master

        # Push safely using --force-with-lease
        git push https://x-access-token:${{ secrets.API_TOKEN }}@github.com/${{ github.repository }}.wiki.git master --force-with-lease