name: Pull Request

on:
  pull_request:
    branches: [ develop, main ]

permissions:
  contents: read

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: true
  NOMAD_CONFIGURATION: Release

jobs:
  validate:
    name: Validate PR
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        cache: true
        cache-dependency-path: |
          **/*.csproj
          **/*.props
          **/*.targets

    - name: Restore
      shell: pwsh
      run: ./Build/Scripts/restore.ps1

    - name: Validate repo
      shell: pwsh
      run: ./Build/Scripts/validate-repo.ps1

    - name: Format check
      shell: pwsh
      run: ./Build/Scripts/format-check.ps1

    - name: Build
      shell: pwsh
      run: ./Build/Scripts/build.ps1

    - name: Unit tests
      shell: pwsh
      run: ./Build/Scripts/test-unit.ps1

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: pr-test-results
        path: Tests/TestResults
        if-no-files-found: ignore