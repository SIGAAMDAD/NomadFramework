name: Validate Nomad Subsystems

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  validate:
    runs-on: [ ubuntu-latest, windows-latest ]

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore Tools
      run: dotnet restore Tools/Nomad.ValidateGraph/Nomad.ValidateGraph.csproj

    - name: Validate Subsystem Graph
      run: dotnet run --project Tools/Nomad.ValidateGraph/Nomad.ValidateGraph.csproj